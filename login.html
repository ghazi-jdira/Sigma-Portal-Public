<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Energy — Client Portal</title>
<style>
  :root{ --navy:#0f2350; --yellow:#f5b800; }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{font-family:"Segoe UI",Arial,sans-serif;background:linear-gradient(135deg,#0f2350,#1b346b);
    display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;width:440px;max-width:94vw;border-radius:12px;
    box-shadow:0 24px 60px rgba(0,0,0,.45);padding:28px 30px;}
  .logo{display:flex;align-items:center;gap:8px;margin-bottom:18px;}
  .logo img{height:46px;width:auto;}
  h1{margin:0 0 2px;color:var(--navy);font-size:21px;}
  p.sub{margin:0 0 18px;color:#666;font-size:13px;}
  label{display:block;font-size:12px;font-weight:600;color:#444;margin:10px 0 4px;}
  input{width:100%;border:1px solid #c3cee3;border-radius:6px;padding:10px 12px;font-size:14px;}
  input:focus{outline:none;border-color:var(--navy);}
  .err{color:#a12222;font-size:12.5px;min-height:18px;margin:8px 0 2px;}
  button.go{width:100%;background:var(--navy);color:#fff;border:0;border-radius:6px;
    padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
  button.go:hover{filter:brightness(1.12);}
  .bar{height:5px;background:var(--yellow);border-radius:3px;margin:16px 0 0;}
  /* portal (after sign-in) */
  #portal{display:none;}
  #portal .who{font-size:13px;color:#444;margin:0 0 14px;}
  #portal .who b{color:var(--navy);}
  .group h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:#8a93a6;
    margin:16px 0 6px;border-bottom:1px solid #eee;padding-bottom:4px;}
  a.report{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--navy);
    border:1px solid #d8e0f0;border-radius:7px;padding:10px 12px;margin:6px 0;font-size:14px;
    background:#f7f9fe;transition:.12s;}
  a.report:hover{background:#eef3fd;border-color:var(--navy);}
  a.report .ic{color:var(--yellow);font-weight:700;}
  a.report .rname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  a.report .rdate{flex:none;color:#8a93a6;font-size:11px;font-weight:600;margin-left:8px;white-space:nowrap;}
  a.report.tmpl{background:#fffdf2;border-color:#f0e2a8;}
  .report-row{display:flex;align-items:center;gap:6px;}
  .report-row a.report{flex:1;}
  .del-btn{flex:none;border:1px solid #f0c9c9;background:#fdf2f2;color:#a12222;border-radius:7px;
    padding:9px 11px;font-size:14px;line-height:1;cursor:pointer;}
  .del-btn:hover{background:#f7dede;border-color:#d98a8a;}
  .none{color:#888;font-size:13px;font-style:italic;margin:6px 0;}
  button.out{background:#eee;border:1px solid #ccc;border-radius:6px;padding:8px 14px;
    font-size:13px;font-weight:600;cursor:pointer;color:#444;margin-top:16px;}
  /* hash-generator tool */
  .tool{margin-top:18px;border-top:1px solid #eee;padding-top:12px;font-size:12px;}
  .tool summary{cursor:pointer;color:var(--navy);font-weight:600;}
  .tool .row{display:flex;gap:8px;margin-top:8px;}
  .tool input{font-size:13px;}
  .tool button{border:1px solid #c3cee3;background:#eef2fb;color:var(--navy);border-radius:5px;
    padding:8px 12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .tool textarea{width:100%;margin-top:8px;border:1px solid #c3cee3;border-radius:6px;
    padding:8px;font-family:monospace;font-size:12px;min-height:64px;resize:vertical;}
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADwn74AveSFCMRcblEAAAAASUVORK5CYII=" alt="Sigma Energy">

    <!-- ===== SIGN-IN VIEW ===== -->
    <div id="signin">
      <h1>Client Portal</h1>
      <p class="sub">Authorised access only. Sign in to view your audit reports.</p>
      <form id="login-form" autocomplete="on">
        <label for="u">Username (client name)</label>
        <input id="u" type="text" autocomplete="username" autofocus>
        <label for="p">Password</label>
        <input id="p" type="password" autocomplete="current-password">
        <div class="err" id="err"></div>
        <button class="go" type="submit">Sign in</button>
      </form>
      <div class="bar"></div>
    </div>

    <!-- ===== PORTAL VIEW (after sign-in) ===== -->
    <div id="portal">
      <h1>Your Reports</h1>
      <p class="who">Signed in as <b id="who-name"></b></p>
      <div id="report-list"></div>
      <button class="out" id="signout">Sign out</button>
    </div>
  </div>

<script>
  /* ---------- config ----------
     BASE = the private report service (the Render URL). Everything the portal
     reads (users.json, /reports) and links to (reports, template) lives there.
     Leave BASE = '' only if the login is served from the SAME origin as the
     reports (e.g. an all-in-one local server). */
  var BASE      = 'https://sigma-portal-private-2.onrender.com';
  var USERS_URL = BASE + '/users.json';   /* credentials file on the private service */
  var ROOT      = BASE + '/';             /* report/template links resolve against this */
  /* gate token appended to report links; the report's guard checks it and
     redirects bare/unauthorised URLs back to this login page. Must match the
     TOKEN constant in each report's access-gate script. */
  var GATE      = 'SIG-PORTAL-GATE';

  /* ---------- crypto helpers ---------- */
  async function sha256hex(str){
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }
  function randSalt(){
    var a = new Uint8Array(8); crypto.getRandomValues(a);
    return Array.from(a).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }

  /* ---------- helpers ---------- */
  var REPORT_DATES = {};   /* path -> "YYYY-MM-DD" last-updated, filled from /reports */
  function fileName(path){ return path.split('/').pop(); }
  function reportLink(path, isTemplate){
    var a = document.createElement('a');
    a.className = 'report' + (isTemplate ? ' tmpl' : '');
    a.href = ROOT + path.split('/').map(encodeURIComponent).join('/') + '#k=' + encodeURIComponent(GATE);
    a.target = '_blank'; a.rel = 'noopener';
    var d = REPORT_DATES[path];
    a.innerHTML = '<span class="ic">' + (isTemplate ? '☆' : '▸') + '</span>'
      + '<span class="rname">' + fileName(path) + '</span>'
      + (d ? '<span class="rdate" title="Last updated">' + d + '</span>' : '');
    return a;
  }
  /* a report row = the link, plus a delete button for administrators */
  function reportRow(path, canDelete){
    var row = document.createElement('div'); row.className = 'report-row';
    row.appendChild(reportLink(path, false));
    if(canDelete){
      var del = document.createElement('button');
      del.className = 'del-btn'; del.type = 'button';
      del.title = 'Delete this report'; del.textContent = '🗑';
      del.addEventListener('click', function(){ confirmDelete(path); });
      row.appendChild(del);
    }
    return row;
  }
  var PORTAL_CFG = null, PORTAL_REC = null;   /* remembered so we can refresh after a delete */
  async function confirmDelete(path){
    if(!window.confirm('Delete this report permanently?\n\n' + path + '\n\nThis cannot be undone.')) return;
    var i = path.indexOf('/');
    var client = i < 0 ? '' : path.slice(0, i);
    var file   = i < 0 ? path : path.slice(i + 1);
    try{
      var res = await fetch(BASE + '/delete', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({client: client, file: file})
      });
      var j = {}; try{ j = await res.json(); }catch(e){}
      if(res.ok && j.ok){
        if(PORTAL_CFG && PORTAL_REC) showPortal(PORTAL_CFG, PORTAL_REC);   /* refresh the list */
      } else {
        alert('Could not delete: ' + (j.error || j.githubError || ('HTTP ' + res.status)));
      }
    }catch(e){ alert('Could not delete: ' + e); }
  }

  /* live list of the reports this user may see — read straight from the
     server's folder (so newly-saved revisions appear automatically), with the
     static users.json list as a fallback when no server is available. */
  async function listReports(cfg, rec){
    try{
      if(rec.role === 'admin'){
        var r = await fetch(BASE + '/reports', {cache:'no-store'});
        if(r.ok){ var j = await r.json(); if(j && j.clients){
          if(j.dates) REPORT_DATES = j.dates;
          var all = []; Object.keys(j.clients).forEach(function(k){ all = all.concat(j.clients[k]); }); return all; } }
      } else {
        var folder = rec.folder || rec.username;
        var r2 = await fetch(BASE + '/reports?client=' + encodeURIComponent(folder), {cache:'no-store'});
        if(r2.ok){ var j2 = await r2.json(); if(j2 && j2.files){ if(j2.dates) REPORT_DATES = j2.dates; return j2.files; } }
      }
    }catch(e){ /* no server -> fall back to the static list below */ }
    if(rec.role === 'admin'){
      var reps = []; (cfg.users||[]).forEach(function(u){ (u.reports||[]).forEach(function(x){ if(reps.indexOf(x)<0) reps.push(x); }); });
      return reps;
    }
    var f = (rec.folder || rec.username) + '/';
    return (rec.reports || []).filter(function(x){ return x.indexOf(f) === 0; });
  }

  /* ---------- render portal for the signed-in user ---------- */
  async function showPortal(cfg, rec){
    PORTAL_CFG = cfg; PORTAL_REC = rec;
    document.getElementById('signin').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
    document.getElementById('who-name').textContent = rec.username + (rec.role==='admin' ? '  (administrator)' : '');

    var list = document.getElementById('report-list');
    list.innerHTML = '';

    var reports = await listReports(cfg, rec);
    var canDelete = (rec.role === 'admin');

    var g1 = document.createElement('div'); g1.className = 'group';
    g1.innerHTML = '<h2>Audit Reports</h2>';
    if(reports && reports.length){
      reports.sort().forEach(function(r){ g1.appendChild(reportRow(r, canDelete)); });
    } else {
      var n = document.createElement('div'); n.className='none';
      n.textContent = 'No reports are assigned to your account yet.';
      g1.appendChild(n);
    }
    list.appendChild(g1);

    /* the shared template is available to everyone */
    if(cfg.templateFile){
      var g2 = document.createElement('div'); g2.className = 'group';
      g2.innerHTML = '<h2>Template</h2>';
      g2.appendChild(reportLink(cfg.templateFile, true));
      list.appendChild(g2);
    }
  }

  /* ---------- login ---------- */
  document.getElementById('login-form').addEventListener('submit', async function(e){
    e.preventDefault();
    var err = document.getElementById('err'); err.textContent = '';
    var u = document.getElementById('u').value.trim();
    var p = document.getElementById('p').value;
    if(!u || !p){ err.textContent = 'Enter username and password.'; return; }

    var cfg;
    try{
      var res = await fetch(USERS_URL, {cache:'no-store'});
      cfg = await res.json();
    }catch(ex){
      err.textContent = 'Could not read users.json (the site must be served over http, not opened as a file).';
      return;
    }
    var users = cfg.users || cfg;   /* tolerate a plain array too */
    var rec = users.find(function(x){ return (x.username||'').toLowerCase() === u.toLowerCase(); });
    if(!rec){ err.textContent = 'Invalid username or password.'; return; }
    var h = await sha256hex((rec.salt||'') + ':' + p);
    if(h !== rec.hash){ err.textContent = 'Invalid username or password.'; return; }

    /* success — remember the session and show the portal */
    sessionStorage.setItem('sigmaUser', JSON.stringify({
      username: rec.username, role: rec.role || 'client', folder: rec.folder || rec.username
    }));
    showPortal({users:users, templateFile: cfg.templateFile}, rec);
  });

  /* ---------- restore an active session on reload ---------- */
  (async function(){
    var saved = sessionStorage.getItem('sigmaUser');
    if(!saved) return;
    try{
      var sess = JSON.parse(saved);
      var res = await fetch(USERS_URL, {cache:'no-store'});
      var cfg = await res.json();
      var users = cfg.users || cfg;
      var rec = users.find(function(x){ return (x.username||'') === sess.username; });
      if(rec) showPortal({users:users, templateFile: cfg.templateFile}, rec);
    }catch(e){}
  })();

  /* ---------- sign out ---------- */
  document.getElementById('signout').addEventListener('click', function(){
    sessionStorage.removeItem('sigmaUser');
    document.getElementById('portal').style.display = 'none';
    document.getElementById('signin').style.display = 'block';
    document.getElementById('p').value = '';
  });
</script>
</body>
</html>
